<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaDiGu PRO Ultimate - Supabase</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--p:#2563eb;
--bg:#f1f5f9;
--white:#fff;
--border:#e2e8f0;
--success:#22c55e;
--danger:#ef4444;
}
body{
font-family:Segoe UI,sans-serif;
background:var(--bg);
margin:0;
padding-bottom:90px;
}
.container{
max-width:600px;
margin:auto;
padding:15px;
}
.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}
input,select,textarea,button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
box-sizing:border-box;
}
button{
background:var(--p);
color:white;
border:none;
font-weight:bold;
}
.tab-content{display:none;}
.active{display:block!important;}
.nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:600px;
display:flex;
background:white;
border-top:1px solid #ddd;
}
.nav-btn{
flex:1;
padding:15px 5px;
text-align:center;
cursor:pointer;
}
.active-nav{
background:#eff6ff;
font-weight:bold;
color:var(--p);
}
.st-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
gap:10px;
}
.radio-group{
display:flex;
gap:5px;
}
.radio-group input{
display:none;
}
.radio-box{
border:1px solid #ddd;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
.radio-group input:checked + .radio-box{
background:var(--p);
color:white;
}
</style>
</head>

<body>

<div class="container">

<div id="login-screen" class="tab-content active">
<div class="card">
<h2>Login MaDiGu PRO</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="doLogin()">MASUK</button>
</div>
</div>

<div id="app-screen" class="tab-content">

<div class="card">
<div style="display:flex;justify-content:space-between;">
<div>
<b id="user-n"></b><br>
<small id="school-n"></small>
</div>

<button onclick="logout()" style="width:auto;">Logout</button>
</div>
</div>

<div id="tab-input" class="tab-content">

<div class="card">
<h3>Input Jurnal</h3>

<input type="date" id="tgl">

<select id="mapel">
<option value="">Pilih Mapel</option>
</select>

<select id="kelas" onchange="getStudents('jurnal')">
<option value="">Pilih Kelas</option>
</select>

<textarea id="materi" rows="2" placeholder="Materi"></textarea>

<div id="list-jurnal"></div>

<button id="btn-jurnal" onclick="saveJurnal()" style="display:none;background:var(--success)">
SIMPAN JURNAL
</button>

</div>

</div>

<div id="tab-nilai" class="tab-content">

<div class="card">

<h3>Input Nilai</h3>

<select id="jenis-nilai">
<option value="s1">S1</option>
<option value="s2">S2</option>
<option value="s3">S3</option>
<option value="s4">S4</option>
<option value="f1">F1</option>
<option value="f2">F2</option>
<option value="f3">F3</option>
<option value="f4">F4</option>
<option value="asts">ASTS</option>
<option value="asas">ASAS</option>
</select>

<select id="mapel-n">
<option value="">Pilih Mapel</option>
</select>

<select id="kelas-n" onchange="getStudents('nilai')">
<option value="">Pilih Kelas</option>
</select>

<div id="list-nilai"></div>

<button id="btn-nilai" onclick="saveNilai()" style="display:none;background:var(--success)">
SIMPAN NILAI
</button>

</div>

</div>

<div id="tab-laporan" class="tab-content">

<div class="card">

<h3>Laporan</h3>

<select id="tipe-laporan" onchange="loadLaporan()">
<option value="jurnal">Jurnal</option>
<option value="nilai">Nilai</option>
</select>

<div id="display-laporan"></div>

<button onclick="exportExcel()">DOWNLOAD EXCEL</button>

</div>

</div>

<div class="nav">
<div class="nav-btn" id="n-input" onclick="switchTab('input')">JURNAL</div>
<div class="nav-btn" id="n-nilai" onclick="switchTab('nilai')">NILAI</div>
<div class="nav-btn" id="n-laporan" onclick="switchTab('laporan');loadLaporan()">LAPORAN</div>
</div>

</div>

</div>

<script>

const SUPABASE_URL = 'https://ocakjidyndcojeapdsop.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sBVisHxIzGA1pEtlChR5pw_pcF-J3nm';

const _supabase = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let GURU = {};
let STUDENTS = [];

async function doLogin(){

const username=document.getElementById('user').value;
const password=document.getElementById('pass').value;

const {data,error}=await _supabase
.from('users')
.select('*')
.eq('username',username)
.eq('password',password)
.single();

if(error || !data){
alert('Login gagal');
return;
}

GURU={
nama:data.nama_lengkap,
schoolId:data.school_id
};

localStorage.setItem('madigu_session',JSON.stringify(GURU));

startApp();

}

function startApp(){

switchTab('input');

document.getElementById('user-n').innerText=GURU.nama;
document.getElementById('school-n').innerText=GURU.schoolId;

document.getElementById('tgl').value=
new Date().toISOString().split('T')[0];

initData();

}

window.onload=()=>{

const s=localStorage.getItem('madigu_session');

if(s){
GURU=JSON.parse(s);
startApp();
}

};

async function initData(){

const {data:kelasData}=await _supabase
.from('data')
.select('kelas')
.eq('school_id',GURU.schoolId);

const kelasUnique=[...new Set(kelasData.map(x=>x.kelas))];

let k='<option value="">Pilih Kelas</option>';

kelasUnique.forEach(x=>{
k+=`<option>${x}</option>`;
});

document.getElementById('kelas').innerHTML=k;
document.getElementById('kelas-n').innerHTML=k;

const {data:mapelData}=await _supabase
.from('mapel')
.select('*')
.eq('school_id',GURU.schoolId);

let m='<option value="">Pilih Mapel</option>';

mapelData.forEach(x=>{
m+=`<option>${x.nama_mata_pelajaran}</option>`;
});

document.getElementById('mapel').innerHTML=m;
document.getElementById('mapel-n').innerHTML=m;

}

async function getStudents(type){

const kelas=document.getElementById(
type==='jurnal'?'kelas':'kelas-n'
).value;

const {data}=await _supabase
.from('data')
.select('*')
.eq('kelas',kelas)
.eq('school_id',GURU.schoolId);

STUDENTS=data.map(x=>x.nama_siswa);

let h='';

if(type==='jurnal'){

STUDENTS.forEach((n,i)=>{

h+=`
<div class="st-row">
<span>${n}</span>

<div class="radio-group">

${['H','S','I','A'].map(v=>`

<label>
<input type="radio" name="abs-${i}" value="${v}" ${v==='H'?'checked':''}>
<div class="radio-box">${v}</div>
</label>

`).join('')}

</div>
</div>
`;

});

document.getElementById('list-jurnal').innerHTML=h;
document.getElementById('btn-jurnal').style.display='block';

}else{

STUDENTS.forEach((n,i)=>{

h+=`
<div class="st-row">
<span>${n}</span>
<input type="number" id="nil-${i}" style="width:90px" placeholder="0-100">
</div>
`;

});

document.getElementById('list-nilai').innerHTML=h;
document.getElementById('btn-nilai').style.display='block';

}

}

async function saveJurnal(){

const tanggal=document.getElementById('tgl').value;
const mapel=document.getElementById('mapel').value;
const kelas=document.getElementById('kelas').value;
const materi=document.getElementById('materi').value;

const data=STUDENTS.map((n,i)=>({
tanggal,
guru:GURU.nama,
mapel,
kelas,
materi,
nama_siswa:n,
school_id:GURU.schoolId,
status:document.querySelector(`input[name="abs-${i}"]:checked`).value
}));

const {error}=await _supabase
.from('jurnal')
.insert(data);

if(error){
alert(error.message);
}else{
alert('Jurnal berhasil disimpan');
}

}

async function saveNilai(){

const tanggal=new Date().toISOString().split('T')[0];
const mapel=document.getElementById('mapel-n').value;
const kelas=document.getElementById('kelas-n').value;
const jenis=document.getElementById('jenis-nilai').value;

for(let i=0;i<STUDENTS.length;i++){

const obj={
tanggal,
guru:GURU.nama,
mapel,
kelas,
siswa:STUDENTS[i],
school_id:GURU.schoolId
};

obj[jenis]=document.getElementById(`nil-${i}`).value || 0;

await _supabase
.from('nilai')
.insert([obj]);

}

alert('Nilai berhasil disimpan');

}

async function loadLaporan(){

const tipe=document.getElementById('tipe-laporan').value;

const {data}=await _supabase
.from(tipe)
.select('*')
.eq('school_id',GURU.schoolId)
.order('id',{ascending:false})
.limit(100);

let h='';

data.forEach(d=>{

h+=`
<div class="card">
<b>${d.kelas}</b><br>
${d.nama_siswa || d.siswa}
</div>
`;

});

document.getElementById('display-laporan').innerHTML=h;

}

async function exportExcel(){

const tipe=document.getElementById('tipe-laporan').value;

const {data}=await _supabase
.from(tipe)
.select('*')
.eq('school_id',GURU.schoolId);

const ws=XLSX.utils.json_to_sheet(data);
const wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,'Data');

XLSX.writeFile(wb,`MaDiGu_${tipe}.xlsx`);

}

function switchTab(t){

document.querySelectorAll('.tab-content')
.forEach(x=>x.classList.remove('active'));

document.querySelectorAll('.nav-btn')
.forEach(x=>x.classList.remove('active-nav'));

document.getElementById(
t==='login'?'login-screen':'app-screen'
).classList.add('active');

if(t!=='login'){
document.getElementById('tab-'+t).classList.add('active');
document.getElementById('n-'+t).classList.add('active-nav');
}

}

function logout(){
localStorage.clear();
location.reload();
}

</script>

</body>
</html>
