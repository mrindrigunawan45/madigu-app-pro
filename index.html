<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaDiGu PRO - CSV Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #2563eb; --bg: #f1f5f9; --white: #ffffff; --border: #e2e8f0; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #1e293b; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 15px 0; color: var(--p); border-bottom: 2px solid #eff6ff; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-sec { background: #64748b; margin-top: 10px; }
        .st-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .radio-group { display: flex; gap: 5px; }
        .radio-group input { display: none; }
        .radio-box { border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .radio-group input:checked + .radio-box { background: var(--p); color: white; }
        .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 600px; background: white; display: flex; border-top: 1px solid var(--border); height: 75px; }
        .nav-btn { flex: 1; text-align: center; padding: 15px 5px; font-size: 10px; cursor: pointer; color: #94a3b8; }
        .nav-btn.active-nav { color: var(--p); font-weight: bold; border-top: 4px solid var(--p); background: #f8fafc; }
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); display:none; justify-content:center; align-items:center; z-index:9999; font-weight: bold; color: var(--p); }
        .tab-content { display: none; }
        .active { display: block !important; }
        .log-item { border-left: 5px solid var(--p); padding: 10px; margin-bottom: 8px; background: white; border-radius: 0 8px 8px 0; position: relative; font-size: 13px; }
        .import-box { border: 2px dashed var(--p); padding: 15px; text-align: center; border-radius: 8px; background: #eff6ff; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loading">Memproses...</div>
    <div class="container">
        <div id="login-screen" class="tab-content">
            <div class="card" style="text-align:center; margin-top:50px;">
                <h1 style="color:var(--p);">MaDiGu PRO</h1>
                <input type="text" id="user" placeholder="Username">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="doLogin()">MASUK</button>
            </div>
        </div>

        <div id="app-screen" class="tab-content">
            <div id="tab-input" class="tab-content">
                <div class="card">
                    <h3>📝 Jurnal</h3>
                    <input type="date" id="tgl">
                    <select id="mapel"></select>
                    <select id="kelas" onchange="getStudents('jurnal')"></select>
                    <textarea id="materi" rows="2" placeholder="Materi..."></textarea>
                    <div id="list-jurnal"></div>
                    <button onclick="saveJurnal()" id="btn-jurnal" style="display:none; background:var(--success); margin-top:10px;">SIMPAN JURNAL</button>
                </div>
            </div>

            <div id="tab-nilai" class="tab-content">
                <div class="card">
                    <h3>🏆 Nilai</h3>
                    <input type="text" id="kompetensi" placeholder="Misal: UH1, UTS...">
                    <select id="mapel-n"></select>
                    <select id="kelas-n" onchange="getStudents('nilai')"></select>
                    <div id="list-nilai"></div>
                    <button onclick="saveNilai()" id="btn-nilai" style="display:none; background:var(--success); margin-top:10px;">SIMPAN NILAI</button>
                </div>
            </div>

            <div id="tab-laporan" class="tab-content">
                <div class="card">
                    <h3>📊 Laporan</h3>
                    <select id="tipe-laporan" onchange="loadLaporan()">
                        <option value="jurnal">Jurnal</option>
                        <option value="nilai">Nilai</option>
                    </select>
                    
                    <div class="import-box">
                        <small><b>Import CSV ke Tabel Nilai</b></small><br>
                        <input type="file" id="csv-file" accept=".csv" style="margin:5px 0;">
                        <button onclick="processCSV()" style="padding:8px; font-size:12px;">UNGGAH CSV</button>
                    </div>

                    <div id="display-laporan" style="margin-top:15px;"></div>
                    <button onclick="exportExcel()" class="btn-sec" style="background:var(--success);">📥 DOWNLOAD EXCEL</button>
                </div>
            </div>

            <div class="nav">
                <div class="nav-btn" id="n-input" onclick="switchTab('input')">JURNAL</div>
                <div class="nav-btn" id="n-nilai" onclick="switchTab('nilai')">NILAI</div>
                <div class="nav-btn" id="n-laporan" onclick="switchTab('laporan'); loadLaporan();">LAPORAN</div>
            </div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyQbt3pIMm0VX8V398bRw8qBJ00xxCI4o9jmq6-vL5dcx3hH9obSs5hcSXD_dTVg0QC/exec";
    const SUPABASE_URL = 'https://ocakjidyndcojeapdsop.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_sBVisHxIzGA1pEtlChR5pw_pcF-J3nm';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let GURU = {}; let STUDENTS = [];

    window.onload = () => {
        const s = localStorage.getItem("madigu_session");
        if(s) { GURU = JSON.parse(s); startApp(); } else { switchTab('login'); }
    };

    async function doLogin() {
        loading(true);
        const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:"login", user:user.value, pass:pass.value}) });
        const res = await r.json();
        if(res.success) { GURU = res; localStorage.setItem("madigu_session", JSON.stringify(res)); startApp(); } else alert("Gagal!");
        loading(false);
    }

    function startApp() {
        switchTab('input');
        tgl.value = new Date().toISOString().split('T')[0];
        initData();
    }

    async function initData() {
        const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:"getInitialData", schoolId:GURU.schoolId}) });
        const res = await r.json();
        let k = '<option value="">Pilih Kelas</option>'; res.daftarKelas.forEach(x => k += `<option>${x}</option>`);
        kelas.innerHTML = k; kelas_n.innerHTML = k;
        let m = '<option value="">Pilih Mapel</option>'; res.daftarMapel.forEach(x => m += `<option>${x}</option>`);
        mapel.innerHTML = m; mapel_n.innerHTML = m;
    }

    async function getStudents(type) {
        loading(true);
        const k = document.getElementById(type === 'jurnal' ? 'kelas' : 'kelas-n').value;
        const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({action:"getStudents", kelas:k, schoolId:GURU.schoolId}) });
        STUDENTS = await r.json();
        loading(false);
        let h = '';
        if(type === 'jurnal') {
            STUDENTS.forEach((n, i) => { h += `<div class="st-row"><span>${n}</span><div class="radio-group">${['H','S','I','A'].map(v => `<label><input type="radio" name="abs-${i}" value="${v}" ${v==='H'?'checked':''}><div class="radio-box">${v}</div></label>`).join('')}</div></div>`; });
            document.getElementById('list-jurnal').innerHTML = h; btn_jurnal.style.display = 'block';
        } else {
            STUDENTS.forEach((n, i) => { h += `<div class="st-row"><span>${n}</span><input type="number" id="nil-${i}" style="width:70px; margin:0;" placeholder="0"></div>`; });
            document.getElementById('list-nilai').innerHTML = h; btn_nilai.style.display = 'block';
        }
    }

    async function saveJurnal() {
        const data = STUDENTS.map((n, i) => ({ tanggal: tgl.value, guru: GURU.nama, mapel: mapel.value, kelas: kelas.value, materi: materi.value, nama_siswa: n, status: document.querySelector(`input[name="abs-${i}"]:checked`).value, school_id: GURU.schoolId }));
        loading(true); await _supabase.from('jurnal').insert(data); loading(false); alert("Berhasil!"); location.reload();
    }

    async function saveNilai() {
        const data = STUDENTS.map((n, i) => ({ tanggal: tgl.value, guru: GURU.nama, mapel: mapel_n.value, kelas: kelas_n.value, kompetensi: kompetensi.value, nama_siswa: n, nilai: document.getElementById(`nil-${i}`).value || 0, school_id: GURU.schoolId }));
        loading(true); await _supabase.from('nilai').insert(data); loading(false); alert("Berhasil!"); location.reload();
    }

    async function processCSV() {
        const file = document.getElementById('csv-file').files[0];
        if(!file) return alert("Pilih file CSV!");
        loading(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
            const rows = e.target.result.split('\n');
            const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
            const data = rows.slice(1).filter(r => r.trim() !== "").map(row => {
                const values = row.split(',');
                let obj = {}; headers.forEach((h, i) => { 
                    let v = values[i] ? values[i].trim() : null;
                    if(h === 'nilai') v = parseInt(v) || 0;
                    obj[h] = v;
                });
                if(!obj.school_id) obj.school_id = GURU.schoolId;
                return obj;
            });
            const { error } = await _supabase.from('nilai').insert(data);
            loading(false);
            if(!error) { alert("Import Berhasil!"); loadLaporan(); } else alert(error.message);
        };
        reader.readAsText(file);
    }

    async function loadLaporan() {
        const t = document.getElementById('tipe-laporan').value;
        loading(true);
        const { data } = await _supabase.from(t).select('*').eq('school_id', GURU.schoolId).order('id', {ascending:false}).limit(100);
        loading(false);
        let h = '';
        data.forEach(d => {
            h += `<div class="log-item"><b>${d.nama_siswa}</b> - ${t === 'jurnal' ? d.status : d.nilai}<br><small>${d.tanggal} | ${d.kelas} | ${d.mapel}</small></div>`;
        });
        document.getElementById('display-laporan').innerHTML = h || 'Kosong';
    }

    async function exportExcel() {
        const t = document.getElementById('tipe-laporan').value;
        const { data } = await _supabase.from(t).select('*').eq('school_id', GURU.schoolId);
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, `MaDiGu_${t}.xlsx`);
    }

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active-nav'));
        if(t === 'login') document.getElementById('login-screen').classList.add('active');
        else { document.getElementById('app-screen').classList.add('active'); document.getElementById('tab-'+t).classList.add('active'); document.getElementById('n-'+t).classList.add('active-nav'); }
    }
    function loading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
</script>
</body>
</html>
